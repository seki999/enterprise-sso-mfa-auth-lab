services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/auth_lab.db
      FRONTEND_URL: http://localhost:3000
    volumes:
      - backend-data:/app/data
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_API_URL: http://localhost:8000
    depends_on:
      - backend
volumes:
  backend-data:
